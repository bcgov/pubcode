name: Pull Request

on:
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  vars:
    if: "!github.event.pull_request.head.repo.fork"
    name: Compute Vars
    runs-on: ubuntu-24.04
    permissions: {}
    outputs:
      schema_branch: ${{ steps.branch.outputs.name }}
    steps:
      - name: Sanitize PR branch name
        id: branch
        env:
          RAW_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -euo pipefail
          safe_branch=$(printf '%s' "$RAW_BRANCH" | tr -cd '[:alnum:]._-')
          echo "name=${safe_branch:-main}" >> "$GITHUB_OUTPUT"

  pr-greeting:
    name: PR Greeting
    needs: [vars]
    env:
      DOMAIN: apps.silver.devops.gov.bc.ca
      PREFIX: ${{ github.event.repository.name }}-${{ github.event.number }}
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - name: PR Greeting
        uses: bcgov/actions/pr-description-add@0992e41cd11c5370b77f9e6066effe63efe9f8c9 # v0.4.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          add_markdown: |
            ---

            Thanks for the PR!

            Any successful deployments (not always required) will be available below.
            [API](https://${{ env.PREFIX }}-api.${{ env.DOMAIN }}/) available
            [Frontend](https://${{ env.PREFIX }}.${{ env.DOMAIN }}/) available

            Once merged, code will be promoted and handed off to following workflow run.
            [Main Merge Workflow](https://github.com/${{ github.repository }}/actions/workflows/merge-main.yml)

  builds:
    name: Builds
    needs: [vars]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      attestations: write
      id-token: write
      packages: write
    strategy:
      matrix:
        package: [api, database, frontend]
    steps:
      - uses: actions/checkout@v7
      - uses: bcgov/actions/builder-ghcr@0992e41cd11c5370b77f9e6066effe63efe9f8c9 # v0.4.0
        with:
          package: ${{ matrix.package }}
          tags: ${{ github.event.number || github.sha }}
          tag_fallback: latest
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: shrink/actions-docker-registry-tag@e6aaef25c595b6e0edd18bf4c7dbfea3abd43299 # v5
        with:
          registry: ghcr.io
          repository: ${{ github.repository }}/${{ matrix.package }}
          target: ${{ github.event.number || github.sha }}
          tags: ${{ github.sha }}

  deploys:
    name: Deploys
    needs: [builds, vars]
    permissions:
      contents: read
    uses: ./.github/workflows/.deploy.yml
    secrets: inherit
    with:
      autoscaling: false
      tag: ${{ github.event.number }}
      release_name: pubcode-${{ github.event.number }}
      params: |
        --set-string global.repository=${{ github.repository }}  \
        --set-string database.containers[0].tag="${{ github.sha }}" \
        --set-string database.initContainers[0].tag="${{ github.sha }}" \
        --set-string api.containers[0].tag="${{ github.sha }}" \
        --set-string api.containers[0].resources.requests.cpu="30m" \
        --set-string api.containers[0].resources.requests.memory="50Mi" \
        --set-string frontend.containers[0].tag="${{ github.sha }}" \
        --set-string frontend.containers[0].resources.requests.cpu="30m" \
        --set-string frontend.containers[0].resources.requests.memory="50Mi" \
        --set-string database.containers[0].resources.requests.cpu="30m" \
        --set-string database.containers[0].resources.requests.memory="50Mi" \
        --set-string database.initContainers[0].resources.requests.cpu="30m" \
        --set-string database.initContainers[0].resources.requests.memory="50Mi" \
        --set-string database.pvc.size="350Mi" \
        --set-string global.env.VITE_SCHEMA_BRANCH=${{ needs.vars.outputs.schema_branch }} \

  tests:
    name: Tests
    needs: [deploys]
    permissions:
      contents: read
    uses: ./.github/workflows/.tests.yml
    with:
      target: ${{ github.event.number }}

  results:
    name: Results
    if: always()
    needs: [vars, pr-greeting, builds, deploys, tests]
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    steps:
      - name: Fail if any dependent job failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
